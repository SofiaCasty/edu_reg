services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: school_management
      MYSQL_USER: school_user
      MYSQL_PASSWORD: school_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    environment:
      APP_ENV: ${APP_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-super-secret-session-key}
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://school_user:school_pass@db:3306/school_management}
      IMPORT_ARCHIVE_PATH: ${IMPORT_ARCHIVE_PATH:-/app/data/drive-download-20260317T201651Z-1-001.zip}
      AUTO_BOOTSTRAP_DATA: ${AUTO_BOOTSTRAP_DATA:-true}
    ports:
      - "8080:8080"
    volumes:
      - /Users/sofiaromero/Downloads/drive-download-20260317T201651Z-1-001.zip:/app/data/drive-download-20260317T201651Z-1-001.zip:ro

volumes:
  mysql_data:
